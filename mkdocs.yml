site_name: MOS-9
site_description: 开源机器人MOS-9，涵盖机械设计、电路系统、通信框架、运动控制、仿真与模型、教程和开发参考
site_url: https://yourname.github.io/open-robot-docs/
repo_url: https://github.com/yourname/open-robot-docs
repo_name: yourname/open-robot-docs
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.path
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.action.view

  palette:
    - scheme: default
      primary: blue
      accent: blue

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yourname/open-robot-docs

nav:
  - 首页: index.md
  - 项目背景: robocup_intro.md

  - 系统总览:
      - 总体架构: overview/architecture.md

  - 机械设计:
      - 概览: mechanical/index.md
      - 构型设计: mechanical/body-structure.md
      - 电机选型: mechanical/motor_selection.md
      - 结构件设计: mechanical/link_design.md
      - 材料与加工: mechanical/materials.md
      - 装配指南: mechanical/assembly.md

  - 电路系统:
      - 概览: electronics/index.md

  - 通信框架:
      - 概览: communication/index.md
      - 电机通讯: communication/motor_communication.md
      - 进程间通讯: communication/robot_ipc.md
      - Robot IPC实现: communication/robot_ipc_framework.md

  - 运动控制:
      - 概览: control/index.md

  - 仿真与模型:
      - 概览: simulation/index.md
      - URDF: simulation/urdf.md
      - XML: simulation/xml.md
      - USD: simulation/usd.md
      - 资源组织: simulation/assets.md
      - Sim-to-Real: simulation/sim2real.md

  - 教程:
      - 概览: tutorials/index.md
      - 从零启动系统: tutorials/bringup.md
      - 添加一个关节: tutorials/add-a-joint.md
      - 添加一个传感器: tutorials/add-a-sensor.md
      - 训练行走策略: tutorials/train-walking.md
      - 部署踢球策略: tutorials/deploy-kick-policy.md


  - 开发指南:
      - 概览: development/index.md
      - 环境配置: development/setup.md
      - 构建方式: development/build.md
      - 测试: development/testing.md
      - 贡献指南: development/contributing.md

  - FAQ:
      - 概览: faq/index.md